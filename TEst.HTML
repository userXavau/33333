<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по госам</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --bg-card: #1a1816;
  --bg-elevated: #252220;
  --ink: #f5f0e8;
  --ink-dim: #a8a097;
  --ink-faint: #6b645c;
  --accent: #d4a574;
  --accent-hot: #ff6b3d;
  --correct: #7cb342;
  --wrong: #e57373;
  --border: #322e2a;
  --serif: 'Fraunces', Georgia, serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--serif);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding: 24px 16px;
  background-image: 
    radial-gradient(at 20% 10%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
    radial-gradient(at 80% 80%, rgba(255, 107, 61, 0.05) 0%, transparent 50%);
}

.container { max-width: 760px; margin: 0 auto; }

.header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.title {
  font-family: var(--serif);
  font-weight: 800;
  font-size: clamp(28px, 5vw, 40px);
  line-height: 1.05;
  font-variation-settings: "opsz" 144;
  letter-spacing: -0.02em;
}

.title em { font-style: italic; color: var(--accent); font-weight: 400; }

.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin: 24px 0 12px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-hot));
  width: 0%;
  transition: width 0.3s ease;
}

.progress-text {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-dim);
  display: flex;
  justify-content: space-between;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  margin-bottom: 24px;
}

.q-meta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 16px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.q-type { color: var(--accent); }
.q-discipline { color: var(--ink-dim); }

.q-text {
  font-size: 20px;
  line-height: 1.4;
  margin-bottom: 24px;
  font-weight: 600;
  font-variation-settings: "opsz" 60;
}

.q-options {
  font-family: var(--mono);
  font-size: 14px;
  background: var(--bg-elevated);
  border-left: 2px solid var(--accent);
  padding: 16px 20px;
  margin-bottom: 24px;
  line-height: 1.8;
  white-space: pre-wrap;
  color: var(--ink-dim);
}

.input-wrapper { margin-bottom: 16px; }

.input-label {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
  margin-bottom: 8px;
  display: block;
}

input[type="text"], textarea {
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 15px;
  border-radius: 4px;
  transition: border-color 0.2s;
}

input[type="text"]:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
}

textarea { resize: vertical; min-height: 60px; }

.hint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 6px;
  font-style: italic;
}

.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 24px;
}

button {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 15px;
  padding: 12px 24px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: var(--bg);
}
.btn-primary:hover { background: var(--accent-hot); color: var(--ink); }

.btn-secondary {
  background: transparent;
  color: var(--ink-dim);
  border: 1px solid var(--border);
}
.btn-secondary:hover { color: var(--ink); border-color: var(--accent); }

.btn-skip {
  background: transparent;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 8px 0;
}
.btn-skip:hover { color: var(--accent); }

.btn-danger {
  background: transparent;
  color: var(--wrong);
  font-family: var(--mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 8px 0;
  border: none;
}
.btn-danger:hover { color: #ff8a80; }

.feedback {
  margin-top: 16px;
  padding: 16px;
  border-radius: 4px;
  font-size: 15px;
  line-height: 1.5;
}

.feedback.correct {
  background: rgba(124, 179, 66, 0.1);
  border-left: 3px solid var(--correct);
  color: var(--correct);
}

.feedback.wrong {
  background: rgba(229, 115, 115, 0.1);
  border-left: 3px solid var(--wrong);
  color: var(--ink);
}

.feedback .label {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  display: block;
  margin-bottom: 4px;
  opacity: 0.7;
}

.feedback .answer-text {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--ink);
}

.stats {
  display: flex;
  gap: 16px;
  font-family: var(--mono);
  font-size: 12px;
}

.stat-correct { color: var(--correct); }
.stat-wrong { color: var(--wrong); }

/* RESULTS */

.results-hero {
  text-align: center;
  padding: 32px 24px 48px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.results-score {
  font-family: var(--serif);
  font-weight: 800;
  font-size: clamp(72px, 14vw, 120px);
  font-variation-settings: "opsz" 144;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-hot));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 16px 0;
}

.results-grade {
  font-family: var(--serif);
  font-style: italic;
  font-size: 24px;
  color: var(--accent);
}

.results-summary {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-dim);
  margin-top: 12px;
  letter-spacing: 0.05em;
}

.section-title {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.breakdown-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}

.breakdown-cell {
  background: var(--bg-elevated);
  padding: 20px;
  border-radius: 4px;
  border-top: 2px solid var(--accent);
}

.breakdown-number {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 800;
  font-variation-settings: "opsz" 144;
  line-height: 1;
}

.breakdown-percent {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  margin-top: 4px;
}

.breakdown-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
  margin-top: 8px;
}

.discipline-stats {
  margin-bottom: 32px;
}

.discipline-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 16px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.discipline-name {
  font-size: 15px;
  font-weight: 600;
}

.discipline-bar-wrap {
  width: 120px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.discipline-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--correct), var(--accent));
  transition: width 0.6s ease;
}

.discipline-pct {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent);
  min-width: 80px;
  text-align: right;
}

.review-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.filter-pill {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 6px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink-dim);
}

.filter-pill:hover { color: var(--ink); border-color: var(--accent); }
.filter-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.review-item {
  background: var(--bg-elevated);
  padding: 20px;
  border-radius: 4px;
  margin-bottom: 12px;
  border-left: 3px solid var(--wrong);
}

.review-item.correct-item {
  border-left-color: var(--correct);
}

.review-item .review-meta {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

.review-item .q {
  font-size: 15px;
  margin-bottom: 8px;
  font-weight: 600;
}

.review-item .row {
  font-family: var(--mono);
  font-size: 13px;
  margin: 4px 0;
  line-height: 1.5;
}

.review-item .your { color: var(--wrong); }
.review-item .your-correct { color: var(--correct); }
.review-item .correct-ans { color: var(--correct); }

.welcome { text-align: center; padding: 48px 24px; }

.welcome p {
  color: var(--ink-dim);
  font-size: 16px;
  line-height: 1.7;
  margin: 12px auto;
  max-width: 480px;
}

.welcome .start-btn { margin-top: 24px; padding: 16px 36px; font-size: 17px; }

.welcome-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0;
  flex-wrap: wrap;
}

.welcome-stat-number {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
}

.welcome-stat-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-faint);
}

.option-button {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 14px 18px;
  margin-bottom: 8px;
  font-family: var(--mono);
  font-size: 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.4;
}

.option-button:hover {
  border-color: var(--accent);
  background: var(--bg-card);
}

.option-button.selected {
  border-color: var(--accent);
  background: rgba(212, 165, 116, 0.1);
  color: var(--accent);
}

.checkbox-hint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-faint);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* MODAL */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 16px;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  max-width: 440px;
  width: 100%;
  text-align: center;
}

.modal-title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 12px;
}

.modal-body {
  color: var(--ink-dim);
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 24px;
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

@media (max-width: 600px) {
  .card, .modal { padding: 20px; }
  .breakdown-grid { grid-template-columns: 1fr; }
  .discipline-row { grid-template-columns: 1fr; }
  .discipline-bar-wrap, .discipline-pct { width: 100%; text-align: left; }
}
</style>
</head>

<div id="modal-root"></div>

<script>
const QUESTIONS = [{"discipline": "Безопасность ОС и БД", "type": "closed", "question": "Выберите правильные варианты ответа:  Какие угрозы могут исходить изнутри организации на уровне ОС?", "options": "А) Злоупотребление правами root/sudo Б) Несанкционированный доступ к /etc/shadow, ключам, журналам В) Конкуренция между отделами Г) Непродуманная политика увольнений", "answer": "А, Б"}, {"discipline": "Безопасность ОС и БД", "type": "closed", "question": "Выберите правильные варианты ответа:  Какие меры предосторожности принимаются для защиты конфиденциальной информации на уровне ОС?", "options": "А) Ограничение доступа через DAC/MAC Б) Мониторинг доступа к чувствительным файлам через auditd/ETW В) Удаленное уничтожение данных Г) Разделение обязанностей (sudoers, RBAC)", "answer": "А, Б, Г"}, {"discipline": "Серверные приложения для WEB", "type": "closed", "question": "Выберите правильный вариант ответа: Что такое программирование серверной части?", "options": "А) Процесс создания статических страниц Б) Процесс написания кода, который обрабатывает запросы и управляет данными на сервере В) Процесс создания дизайна веб-приложения Г) Обработка текстовых данных от клиента", "answer": "Б"}, {"discipline": "Информационный менеджмент", "type": "open", "question": "Этап, на котором план проекта приводится в действие, выполняются задачи?", "options": null, "answer": "Реализация"}, {"discipline": "Разработка web на JavaScript", "type": "open", "question": "Что будет результатом выполнения выражения? \"23\"+17-\"10\"+20", "options": null, "answer": "2327"}, {"discipline": "Серверные приложения для WEB", "type": "matching", "question": "Установите соответствие между типами данных в JavaScript и их обозначениями", "options": "1. целое число произвольной длины  2. строка  3. отдельный тип, для неизвестных значений, имеющий одно значение  4. отдельный тип, для неприсвоеных значений, имеющий одно значение   А) bigint  Б) string  В) null Г) undefined", "answer": "А-1, Б-2, В-3, Г-4"}, {"discipline": "Информационный менеджмент", "type": "matching", "question": "Соотнесите понятия управление жизненным циклом ИТ-инфраструктуры с их содержанием:", "options": "Понятие  1. Обновление  2. ИТ-инфраструктура предприятия  3. Жизненный цикл ИТ-системы  4. Техническое обслуживание   Содержание  А. Процесс поддержки и обслуживания аппаратных и программных компонентов ИТ-инфраструктуры  Б. Этап жизненного цикла, включающий в себя модернизацию и замену устаревших компонентов ИТ-инфраструктуры  В. Совокупность аппаратных, программных, коммуникационных и сетевых ресурсов, необходимых для функционирования информационных систем Г. Последовательность этапов, через которые проходит информационная система, начиная от ее создания и внедрения до вывода из эксплуатации", "answer": "1-Б 2-В 3-Г 4-А"}, {"discipline": "Безопасность ОС и БД", "type": "closed", "question": "Выберите правильный вариант ответа: Какова главная цель применения Confidential Computing в ОС 2026?", "options": "А) Ускорение работы приложений Б) Защита данных в использовании (in-use) через аппаратные анклавы (SGX/SEV/TDX) В) Снижение потребления энергии Г) Упрощение администрирования", "answer": "Б"}, {"discipline": "Информационный менеджмент", "type": "closed", "question": "Выберите правильный вариант ответа: Какой стандарт чаще всего используется для документирования архитектуры ИС?", "options": "А) ГОСТ 34 Б) ISO 9001 В) IEEE 830 Г) ITIL", "answer": "А"}, {"discipline": "Информационный менеджмент", "type": "closed", "question": "Выберите правильные варианты ответа: Оценить настроения сотрудников в команде, атмосферу и климат в коллективе поможет метрика?", "options": "А) Метрика Happy Index Б) метрика Customer Lifetime Value В) Метрика Effectiveness Г) Метрика eNPS", "answer": "А, Г"}, {"discipline": "Информационный менеджмент", "type": "matching", "question": "Упорядочьте процесс контроля выполнения работ по проекту:", "options": "А) Регулярно анализировать процесс реализации мер по снижению рисков  Б) Контролировать и документировать проблемы проекта по мере их возникновения  В) Разработать стратегии снижения рисков и планы действий для каждого выявленного риска Г) Назначать ответственных лиц для решения проблем и контролировать ход их решения", "answer": "В, А, Б, Г"}, {"discipline": "Реинжиниринг бизнес-процессов", "type": "matching", "question": "Соотнесите признаки классификации функций и их содержание:", "options": "1. По области проявления. 2. По роли в удовлетворении потребностей. 3. По роли в рабочем процессе. 4. По характеру проявления. 5. По характеру получаемого результата. А. Основные функции подчинены главной и обусловливают работоспособность объекта, создание необходимых условий для осуществления главной функции. С помощью вспомогательных функций реализуются основные функции. В ходе оценки функций часто обнаруживается, что именно во вспомогательных функциях заложены основные резервы снижения себестоимости объекта. Б. Внешние функции выполняются объектом в целом и определяют его назначение при взаимодействии с внешней средой. Внутренние функции определяются составом действий и взаимосвязей внутри объекта и выполняются его элементами. В. Главная функция отражает главную цель создания объекта, второстепенная - побочную цель, но она может способствовать увеличению спроса на изделие. Г. Полезные и бесполезные, а последние делят на нейтральные и вредные. Д. Номинальные функции создаются при формировании и создании объекта и обязательны для выполнения. Потенциальные функции отражают возможность выполнения объектом каких-либо функций при изменении условий его эксплуатации. Действительные функции - фактически выполняемые функции.", "answer": "1-Б 2-В 3-А 4-Д 5-Г"}, {"discipline": "Информационный менеджмент", "type": "open", "question": "На чем следует сосредоточить внимание при анализе конкурентов при проведении исследования новых рынков ИТ-продуктов?", "options": null, "answer": "Оценка предложений продуктов конкурентов, анализ ценовой стратегии ко function normalize(s) {
  if (!s) return '';
  return String(s).toLowerCase()
    .replace(/[\s,\.;:\-\(\)]+/g, '')
    .replace(/ё/g, 'е')
    .trim();
}

function extractLetters(s) {
  const letters = String(s).toLowerCase().match(/[а-я]/g) || [];
  return [...new Set(letters)].sort();
}

function checkClosed(user, correct) {
  const u = extractLetters(user);
  const c = extractLetters(correct);
  if (u.length !== c.length) return false;
  return u.every((l, i) => l === c[i]);
}

function checkMatching(user, correct) {
  function getPairs(s) {
    const matches = String(s).toLowerCase().match(/([1-9а-я])\s*[-—–]\s*([1-9а-я])/g) || [];
    return matches.map(m => {
      const parts = m.toLowerCase().split(/[-—–]/).map(p => p.trim());
      const a = parts[0], b = parts[1];
      if (/[1-9]/.test(a)) return a + '-' + b;
      return b + '-' + a;
    }).sort();
  }
  const u = getPairs(user);
  const c = getPairs(correct);
  if (u.length !== c.length || u.length === 0) return false;
  return u.every((p, i) => p === c[i]);
}

function checkSequence(user, correct) {
  const u = String(user).toLowerCase().match(/[а-я]/g) || [];
  const c = String(correct).toLowerCase().match(/[а-я]/g) || [];
  if (u.length !== c.length) return false;
  return u.every((l, i) => l === c[i]);
}

function checkOpen(user, correct) {
  const u = normalize(user);
  const c = normalize(correct);
  if (!u) return false;
  if (u === c) return true;
  if (c.length > 4 && u.includes(c)) return true;
  if (u.length > 4 && c.includes(u)) return true;
  return false;
}

function checkAnswer(q, userAnswer) {
  if (q.type === 'closed') return checkClosed(userAnswer, q.answer);
  if (q.type === 'matching') {
    if (/[-—–]/.test(q.answer)) return checkMatching(userAnswer, q.answer);
    return checkSequence(userAnswer, q.answer);
  }
  if (q.type === 'open') return checkOpen(userAnswer, q.answer);
  return false;
}

function isMultiSelect(q) {
  return /правильные варианты/i.test(q.question) || extractLetters(q.answer).length > 1;
}

function parseOptions(opts) {
  if (!opts) return [];
  const regex = /([А-Я])\)\s*/g;
  const indices = [];
  let m;
  while ((m = regex.exec(opts)) !== null) {
    indices.push({letter: m[1], pos: m.index, end: regex.lastIndex});
  }
  if (indices.length < 2) return [];
  const items = [];
  for (let i = 0; i < indices.length; i++) {
    const start = indices[i].end;
    const end = i + 1 < indices.length ? indices[i+1].pos : opts.length;
    items.push({letter: indices[i].letter, text: opts.slice(start, end).trim()});
  }
  return items;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showModal(opts) {
  state.modal = opts;
  renderModal();
}

function closeModal() {
  state.modal = null;
  renderModal();
}

function renderModal() {
  if (!state.modal) {
    modalRoot.innerHTML = '';
    return;
  }
  const m = state.modal;
  modalRoot.innerHTML = `
    <div class="modal-backdrop" onclick="if(event.target===this)closeModal()">

        <div class="modal-body">${escapeHtml(m.body)}</div>
        <div class="modal-actions">
          ${m.buttons.map((b, i) => `

          `).join('')}
        </div>
      </div>

  `;
}

function handleModalBtn(i) {
  const fn = state.modal.buttons[i].action;
  closeModal();
  if (fn) fn();
}

function renderQuestion() {

  const progress = ((state.index) / total * 100).toFixed(1);

  let typeLabel = '';

  } else {
    typeLabel = 'Открытый вопрос';
  }
  
  let inputHtml = '';

    const items = parseOptions(q.options);

      const selected = state.currentAnswer || [];

        <input type="text" id="answerInput" placeholder="${isMatch ? 'Например: 1-А, 2-Б, 3-В, 4-Г' : 'Например: А, В, Б, Г'}" 
               oninput="state.currentAnswer = this.value" value="${state.currentAnswer || ''}">
        <div class="hint">${isMatch ? 'Укажи пары цифра-буква через запятую' : 'Укажи буквы в правильной последовательности через запятую'}</div>

function toggleOption(letter, multi) {
  if (state.showFeedback) return;
  if (!Array.isArray(state.currentAnswer)) state.currentAnswer = [];
  if (multi) {
    if (state.currentAnswer.includes(letter)) {
      state.currentAnswer = state.currentAnswer.filter(l => l !== letter);
    } else {
      state.currentAnswer = [...state.currentAnswer, letter];
    }
  } else {
    state.currentAnswer = [letter];
  }
  render();
}

function submitAnswer() {
  const q = QUESTIONS[state.index];
  let userAnswer = state.currentAnswer;
  if (Array.isArray(userAnswer)) userAnswer = userAnswer.join(', ');
  if (!userAnswer || (typeof userAnswer === 'string' && !userAnswer.trim())) {
    showModal({
      title: 'Нужен ответ',
      body: 'Введи ответ или нажми «Пропустить».',
      buttons: [{label: 'OK', style: 'btn-primary'}]
    });
    return;
  }
  const isCorrect = checkAnswer(q, userAnswer);
  state.answers.push({
    qIndex: state.index,
    userAnswer: userAnswer,
    isCorrect: isCorrect
  });
  state.lastCorrect = isCorrect;
  state.showFeedback = true;
  render();
}

function skipQuestion() {
  state.answers.push({
    qIndex: state.index,
    userAnswer: '(пропущено)',
    isCorrect: false
  });
  state.lastCorrect = false;
  state.showFeedback = true;
  render();
}

function nextQuestion() {
  state.showFeedback = false;
  state.currentAnswer = null;
  state.index++;
  if (state.index >= QUESTIONS.length) {
    state.screen = 'results';
  }
  render();
}

function askFinishEarly() {
  const answered = state.answers.length;
  const remaining = QUESTIONS.length - answered;
  showModal({
    title: 'Завершить тест?',
    body: answered === 0 
      ? 'Ты ещё не ответил ни на один вопрос.'
      : `Отвечено: ${answered}. Останется без ответа: ${remaining}. Посмотреть результаты по тому, что уже отвечено?`,
    buttons: [
      {label: 'Продолжить', style: 'btn-secondary'},
      {label: 'Завершить', style: 'btn-primary', action: finishNow}
    ]
  });
}

function finishNow() {
  state.screen = 'results';
  state.showFeedback = false;
  state.currentAnswer = null;
  render();
}

function renderResults() {
  const total = state.answers.length;
  const correct = state.answers.filter(a => a.isCorrect).length;
  const wrong = total - correct;
  const skipped = state.answers.filter(a => a.userAnswer === '(пропущено)').length;
  const percent = total > 0 ? Math.round(correct / total * 100) : 0;
  
  // By type
  const byType = {closed: {c: 0, t: 0, label: 'Закрытые'}, matching: {c: 0, t: 0, label: 'Соответствия'}, open: {c: 0, t: 0, label: 'Открытые'}};
  state.answers.forEach(a => {
    const q = QUESTIONS[a.qIndex];
    byType[q.type].t++;
    if (a.isCorrect) byType[q.type].c++;
  });
  
  // By discipline
  const byDisc = {};
  state.answers.forEach(a => {
    const q = QUESTIONS[a.qIndex];
    const d = q.discipline || 'Без дисциплины';
    if (!byDisc[d]) byDisc[d] = {c: 0, t: 0};
    byDisc[d].t++;
    if (a.isCorrect) byDisc[d].c++;
  });
  
  let grade, gradeColor;
  if (percent >= 90) { grade = 'Отлично'; gradeColor = 'var(--correct)'; }
  else if (percent >= 75) { grade = 'Хорошо'; gradeColor = 'var(--accent)'; }
  else if (percent >= 60) { grade = 'Удовлетворительно'; gradeColor = 'var(--accent-hot)'; }
  else { grade = 'Нужно ещё поработать'; gradeColor = 'var(--wrong)'; }
  
  // Filter review items
  const filter = state.reviewFilter;
  let reviewItems = state.answers.slice();
  if (filter === 'wrong') reviewItems = reviewItems.filter(a => !a.isCorrect);
  else if (filter === 'correct') reviewItems = reviewItems.filter(a => a.isCorrect);
  
  app.innerHTML = `
    <div class="header">
      <div class="eyebrow">Итоги теста</div>
      <h1 class="title">Твой <em>результат</em></h1>
    </div>
    
    <div class="card">
      <div class="results-hero">
        <div class="results-score">${percent}%</div>
        <div class="results-grade" style="color:${gradeColor}">${grade}</div>
        <div class="results-summary">${correct} верно · ${wrong - skipped} неверно${skipped ? ` · ${skipped} пропущено` : ''} из ${total}</div>
      </div>
      
      <div class="section-title">По типам заданий</div>
      <div class="breakdown-grid">
        ${Object.values(byType).map(t => {
          const pct = t.t > 0 ? Math.round(t.c / t.t * 100) : 0;
          return `
            <div class="breakdown-cell">
              <div class="breakdown-number">${t.c}<span style="color:var(--ink-faint);font-size:18px;">/${t.t}</span></div>
              <div class="breakdown-percent">${pct}%</div>
              <div class="breakdown-label">${t.label}</div>
            </div>
          `;
        }).join('')}
      </div>
      
      <div class="section-title">По дисциплинам</div>
      <div class="discipline-stats">
        ${Object.entries(byDisc)
          .sort((a, b) => (b[1].c/b[1].t) - (a[1].c/a[1].t))
          .map(([name, s]) => {
            const pct = s.t > 0 ? Math.round(s.c / s.t * 100) : 0;
            return `
              <div class="discipline-row">
                <div class="discipline-name">${escapeHtml(name)}</div>
                <div class="discipline-bar-wrap"><div class="discipline-bar" style="width:${pct}%"></div></div>
                <div class="discipline-pct">${s.c}/${s.t} · ${pct}%</div>
              </div>
            `;
          }).join('')}
      </div>
      
      <div class="actions" style="justify-content:center;margin-bottom:32px">
        <button class="btn-primary" onclick="startTest()">Пройти заново</button>
        <button class="btn-secondary" onclick="state.screen='welcome';render()">На главную</button>
      </div>
      
      <div class="section-title">Разбор ответов</div>
      <div class="review-filters">
        <div class="filter-pill ${filter==='wrong'?'active':''}" onclick="state.reviewFilter='wrong';render()">
          Только ошибки (${wrong})
        </div>
        <div class="filter-pill ${filter==='correct'?'active':''}" onclick="state.reviewFilter='correct';render()">
          Только верные (${correct})
        </div>
        <div class="filter-pill ${filter==='all'?'active':''}" onclick="state.reviewFilter='all';render()">
          Все (${total})
        </div>
      </div>
      
      ${reviewItems.length === 0 ? 
        `<p style="color:var(--ink-faint);text-align:center;padding:32px">Ничего нет в этой категории.</p>` :
        `<div class="review-list">
          ${reviewItems.map(a => {
            const q = QUESTIONS[a.qIndex];
            return `
              <div class="review-item ${a.isCorrect ? 'correct-item' : ''}">
                <div class="review-meta">
                  ${q.discipline ? escapeHtml(q.discipline) + ' · ' : ''}${q.type === 'closed' ? 'Закрытый' : q.type === 'matching' ? 'Соответствие' : 'Открытый'}
                </div>
                <div class="q">${escapeHtml(q.question)}</div>
                ${q.options ? `<div class="q-options" style="font-size:12px;margin:8px 0;padding:10px 14px">${escapeHtml(q.options)}</div>` : ''}
                <div class="row ${a.isCorrect ? 'your-correct' : 'your'}">Твой ответ: ${escapeHtml(String(a.userAnswer))}</div>
                ${!a.isCorrect ? `<div class="row correct-ans">Верно: ${escapeHtml(q.answer)}</div>` : ''}
              </div>
            `;
          }).join('')}
        </div>`
      }
    </div>
  `;
}

document.addEventListener('keydown', (e) => {
  if (state.modal) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (state.screen !== 'question') return;
  if (e.key === 'Enter' && !e.shiftKey) {
    const target = e.target;
    if (target && target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    if (state.showFeedback) nextQuestion();
    else submitAnswer();
  }
});

render();
</script>
</body>
</html>
